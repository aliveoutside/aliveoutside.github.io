<div class="site-header-content flex flex-row flex-wrap items-center justify-between gap-3">
  <div class="flex items-center gap-4 flex-wrap">
    <h1 class="text-2xl font-bold tracking-tight"><a href="{{ "/" | relLangURL }}" class="hover:text-blue-600 transition-colors">{{ site.Title }}</a></h1>
    {{ partial "language-switcher.html" . }}
  </div>
  <div class="flex items-center gap-3">
    {{ partial "menu.html" (dict "menuID" "main" "page" .) }}
    <button id="theme-toggle" class="theme-toggle w-9 h-9 p-0 justify-center" type="button" aria-label="Toggle theme" title="Toggle theme">
      <span class="theme-toggle__icon text-base"></span>
    </button>
  </div>
</div>

{{- $p := . -}}
{{- $desc := or $p.Params.description $p.Summary -}}
<article class="post-card rounded-lg border border-[color:var(--border)] p-5 hover:shadow-sm transition">
  <h2 class="text-lg font-semibold mb-2">
    <a href="{{ $p.RelPermalink }}" class="post-card__title hover:underline">{{ $p.LinkTitle }}</a>
  </h2>
  {{ with $desc }}<p class="post-card__summary text-sm text-[color:var(--text-dim)] mb-3">{{ . }}</p>{{ end }}
  <div class="post-card__meta flex flex-wrap items-center gap-2 text-xs text-[color:var(--text-dim)]">
    <time datetime="{{ $p.Date }}">{{ $p.Date.Format "02.01.2006" }}</time>
    {{ with $p.Params.tags }}{{ partial "tag-list.html" . }}{{ end }}
  </div>
</article>

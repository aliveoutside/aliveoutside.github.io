{{- $lang := .Type | default "text" -}}
{{- $opts := dict "style" "onedark" "linenos" "false" -}}
{{- $code := highlight .Inner $lang $opts -}}
<div class="code-block" data-lang="{{ $lang }}">
  <div class="code-block__bar">
    <span class="code-block__lang">{{ $lang }}</span>
  </div>
  {{ $code | safeHTML }}
</div>

baseURL = 'https://aliveoutside.github.io/'
languageCode = 'en-US'
title = 'Blog.'
theme = 'tailwind'

[params]
  description = 'Thoughts, notes and little experiments.'

[markup]
  [markup.highlight]
    style = "onedark"
    guessSyntax = true
    lineNos = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 3

[menus]
  [[menus.main]]
    name = 'Home'
    pageRef = '/'
    weight = 10

[build]
  [build.buildStats]
    enable = true
  [[build.cachebusters]]
    source = 'assets/notwatching/hugo_stats\.json'
    target = 'css'
  [[build.cachebusters]]
    source = '(postcss|tailwind)\.config\.js'
    target = 'css'
[module]
  [[module.mounts]]
    source = 'assets'
    target = 'assets'
  [[module.mounts]]
    disableWatch = true
    source = 'hugo_stats.json'
    target = 'assets/notwatching/hugo_stats.json'
